<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prava Deboas</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="w-screen h-screen flex justify-center items-center" >
    <div class=" w-[320px] h-[480px] bg-gray-200 rounded-md flex flex-col">
        
        <div class="flex">
            <div class="h-full w-1/3 flex">
                <a href="index.html" class="h-full w-1/3 flex justify-center items-center">
                    <div class=" h-8 w-8 flex justify-center items-center">
                        <img src="img/seta.png" alt="" class="rotate-180 aumenta">
                    </div>
                </a>
            </div>
            <div class="h-full w-1/3 flex justify-center items-center">
                <h1 class="font-semibold ">OBJETIVOS</h1>
            </div>
            <div class="h-full w-1/3 flex justify-center items-center mb-3">
                <a href="estatisticas.html" class="justify-center items-center aumenta">
                    <div class=" h-8 w-8 flex ">
                        <img src="img/estatistica.png" alt="">
                    </div>
                </a>
            </div>
        </div>


        <!-- CEGO -->
        <div class="w-full h-1/3 flex bg-blue-400">
            <!-- img-cego -->
            <div class=" h-full w-1/2 flex justify-center items-center">
                <div class="h-5/6 w-5/6 flex items-center justify-center">
                    <img id="cego" src="img/cego.png" alt="" class=" relative transition-all duration-300" >
                </div>
            </div>
            <!-- texto -->
            <div class=" h-full w-1/2">
                <h1 class="text-2xl">Ficar Susa</h1>
                <h1>Relaxar,reduzir ansiedade e stress</h1>
            </div>
            <!-- seta -->
            <button id="contadorFicarSusa" class=" h-full w-1/3 flex items-center aumenta">

                <img  src="img/seta.png" alt="">
            </button>
        </div>


        <!-- BRAVO -->
        <div class="w-full h-1/3 flex bg-red-400 items-center">
            <div class=" h-full w-1/2 items-center justify-center flex">
                <!-- animate-bounce -->
                <img src="img/bravo.png" alt="" id="bravo" class="mb-0 relative transition-all  duration-300">
            </div>
            <div class=" h-full w-1/2">
                <h1 class="text-2xl"> Olha a Foca</h1>
                <h1>Aumentar o foco</h1>
                <h1></h1>
            </div>
            <button id="contadorOlhaFoca" class="h-full w-1/3 items-center flex aumenta">

                <img src="img/seta.png" alt="">
            </button>
        </div>

        <!-- DORMINDO -->
        <div class="w-full h-1/3 flex bg-purple-400">
            <div class=" h-full w-1/2 items-center justify-center flex">
                <img src="img/sono.png" alt="" id="dormir" class="transition-all duration-300 relative">
            </div>
            <div class=" h-full w-1/2 ">
                <h1 class="text-2xl">Dormir de boas</h1>
                <h1>Dormir melhor</h1>
            </div>
            <button id="contadorDormirDeBoas" class="h-full w-1/3 items-center flex aumenta">

                <img src="img/seta.png" alt="">
            </button>
        </div>
        <script src="js/script.js"></script>
        
    </div>
</body>
</html>
