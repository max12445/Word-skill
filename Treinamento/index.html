<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Contador Completo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center h-screen">

  <div class="bg-gray-800 text-white p-8 rounded-2xl shadow-lg text-center w-80">

    <h1 class="text-2xl font-bold mb-4">Contador</h1>

    <!-- VALOR -->
    <p id="valor" class="text-5xl font-bold mb-6">0</p>

    <!-- BOTÕES -->
    <div class="flex justify-center gap-4 mb-6">
      <button id="aumentar" class="bg-green-500 hover:bg-green-600 px-4 py-2 rounded-lg">
        +
      </button>

      <button id="diminuir" class="bg-yellow-500 hover:bg-yellow-600 px-4 py-2 rounded-lg">
        -
      </button>

      <button id="resetar" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg">
        Reset
      </button>
    </div>

    <!-- STATUS -->
    <p id="status" class="text-sm text-gray-400">
      Limite: 10
    </p>

  </div>

  <script src="script.js"></script>
</body>
</html>
