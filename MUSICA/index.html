<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="flex justify-center">
    <div class="flex h-[700px] w-[750px] bg-slate-400">
        <div class="h-full w-2/3 flex bg-blue-200 flex-col">
            <div class="flex h-1/2 w-full justify-center items-center">
                <img src="img/img-musica.jfif" alt="" class="h-70 w-70 rounded-lg">
            </div>
            <div class="flex h-1/2 w-full justify-center flex-col  items-center">
                <!-- barra de progressão -->
                <div class="h-4 w-65 border-3 rounded-l " >
                    <div class="h-full bg-green-500 w-0" id="progressao"></div>
                </div>
                <div class="flex justify-between mb-8">
                    <div class="" id="tempo1"></div>
                    <div class="" id="tempo2"></div>
                </div>
                <!-- estado da musica (pausado ou não) -->
                <img src="img/play.png" alt="" id="State" class=" border-3 rounded-full flex">
                <!-- nome da musica -->
                <div class="h-15 w-40 border-3 rounded-lg mt-10"></div> 
            </div>
        </div>
        <div class="h-full w-1/3 flex bg-red-200"></div>
    </div>
    <audio id="audio"></audio>
    <script src="js/script.js"></script>
</body>
</html>
